spring.application.name=clinic_app

# explicitly tell which driver to use
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.url=jdbc:mysql://insertHostHere:3306/cms
spring.datasource.username=${MYSQL_USERNAME}
# windows
# set MYSQL_USERNAME=
# set MYSQL_PASSWORD=

# unix
# export MYSQL_USERNAME=
# export MYSQL_PASSWORD=
spring.datasource.password=${MYSQL_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.data.mongodb.uri=mongodb://${MONGODB_USERNAME}:${MONGODB_PASSWORD}@insertHostHere:27017/cms
spring.data.mongodb.database=cms

