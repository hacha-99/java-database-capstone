<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>CMS - Clinic Management System</title>

        <link rel="icon" href="./assets/images/favicon.ico" type="image/x-icon"/>

        <link rel="stylesheet" href="./assets/css/index.css">
        <link rel="stylesheet" href="./assets/css/style.css">

        <script src="./js/util.js" defer></script>
        <script src="./js/render.js" defer></script>

        <script src="./js/components/header.js" defer></script>
        <script src="./js/components/footer.js" defer></script>
    </head>
    <body>
        <div class="container">
            <div class="wrapper">
                <div id="header">

                </div>
                <main class="main-content">
                    <h2>Select Your Role</h2>
                    <button id="admin-btn" onclick="selectRole('Admin')">Admin</button>
                    <button id="doctor-btn" onclick="selectRole('Doctor')">Doctor</button>
                    <button id="patient-btn" onclick="selectRole('Patient')">Patient</button>
                </main>
                <div id="footer">
                    
                </div>
            </div>
        </div>
        <div id="modal" class="modal" style="display:none;">
            <button id="closeModal">Close</button>
            <div id="modal-body"></div>
        </div>
        <script type="module" src="./js/services/index.js" defer></script>
    </body>
</html>
