<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="icon" th:href="@{/assets/images/clinic_icon_by_Linector.png}" type="image/x-icon" />

    <link rel="stylesheet" th:href="@{/assets/css/adminDashboard.css}">
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">

    <script th:src="@{/js/render.js}" defer></script>
    <script th:src="@{/js/util.js}" defer></script>

    <script th:src="@{/js/components/header.js}" defer></script>
    <script th:src="@{/js/components/footer.js}" defer></script>
</head>

<body>
    <div class="container">
        <div class="wrapper">
            <div id="header">
                <!-- dynamic -->
            </div>
            <main class="main-content">
                <input type="text" id="searchBar" placeholder="Search by doctor name..." />
                <div class="filter-wrapper">
                    <div class="filterDiv" id="timeDiv">
                        <select class="filterSelects" id="filterTime">
                            <option value="" selected disabled>Sort by time</option>
                            <option value="asc">Earliest first</option>
                            <option value="desc">Latest first</option>
                        </select>
                        <button id="timeReset"><img th:src="@{/assets/images/reset_icon_by_inkubators.png}"
                                alt="Reset"></button>
                    </div>
                    <div class="filterDiv" id="specialtyDiv">
                        <select class="filterSelects" id="filterSpecialty">
                            <option value="" selected disabled>Filter by specialty</option>
                            <option value="cardiology">Cardiology</option>
                            <option value="dermatology">Dermatology</option>
                            <option value="neurology">Neurology</option>
                        </select>
                        <button id="specialtyReset"><img th:src="@{/assets/images/reset_icon_by_inkubators.png}"
                                alt="Reset"></button>
                    </div>
                    <button id="adminBtn" onclick="openModal()">Add Doctor</button>
                </div>
                <div id="content">
                    <!-- <div style="border: 2px solid gray;">card</div>
                        <div style="border: 2px solid gray;">card2</div> -->

                    <!-- dynamic -->
                </div>
            </main>
            <div id="footer">
                <!-- dynamic -->
            </div>
        </div>
    </div>
    <div class="modal-backdrop" id="backdrop"></div>
    <div id="modal" class="modal">
        <span id="closeModal" class="close">&times;</span>
        <div id="modal-body">
            <!-- <input type="text" placeholder="just testing..." />
            <select name="examp_select" id="examp_select"></select> -->
            <button id="addDoctorBtn">Add Doctor</button>
        </div>
    </div>
    <script type="module" src="../js/services/adminDashboard.js" defer></script>
    <script type="module" src="../js/components/doctorCard.js" defer></script>
</body>

</html>
