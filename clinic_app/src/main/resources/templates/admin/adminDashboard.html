<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Admin Dashboard</title>
        <link rel="stylesheet" th:href="@{/assets/css/adminDashboard.css}">
        <link rel="stylesheet" th:href="@{/assets/css/style.css}">

        <script th:src="@{/js/render.js}" defer></script>
        <script th:src="@{/js/util.js}" defer></script>

        <script th:src="@{/js/components/header.js}" defer></script>
        <script th:src="@{/js/components/footer.js}" defer></script>
    </head>
    <body>
        <div class="container">
            <div class="wrapper">
                <div id="header"></div>
                <main class="main-content">
                    <input type="text" id="searchBar" placeholder="Search by doctor name" />
                    <section class="filters">
                        <div id="timeDiv">
                            <select id="sortTime">
                                <option value="" selected disabled>Sort by time</option>
                                <option value="asc">Earliest first</option>
                                <option value="desc">Latest first</option>
                            </select>
                            <button class="timeReset"><img th:src="@{/assets/images/reset_icon_by_inkubators.png}" alt="Reset"></button>
                        </div>
                        <div id="specialtyDiv">
                            <select id="filterSpecialty">
                                <option value="" selected disabled>Filter by specialty</option>
                                <option value="cardiology">Cardiology</option>
                                <option value="dermatology">Dermatology</option>
                                <option value="neurology">Neurology</option>
                            </select>
                            <button class="specialtyReset"><img th:src="@{/assets/images/reset_icon_by_inkubators.png}" alt="Reset"></button>
                        </div>
                    </section>
                    <div id="content"></div>
                </main>
                <div id="footer"></div>
            </div>
        </div>
        <div id="modal" class="modal">
            <span id="closeModal" class="close">&times;</span>
            <div id="modal-body"></div>
        </div>
        <script type="module" src="../js/services/adminDashboard.js" defer></script>
        <script type="module" src="../js/components/doctorCard.js" defer></script>
    </body>
</html>
